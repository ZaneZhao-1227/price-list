<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明日采购 · 汇总</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <h1>📊 采购汇总</h1>
      <span class="date-badge" id="date-badge"></span>
    </div>
    <nav class="app-nav">
      <a href="index.html">选购</a>
      <a href="summary.html" class="active">汇总</a>
      <a href="admin.html">管理</a>
    </nav>
  </header>

  <main class="app-main">
    <div class="config-tip" id="config-tip" style="display:none;">
      ⚠️ 当前使用本地数据，只显示本机选购记录。
      <a href="admin.html">配置 GitHub 同步后</a>可查看所有人的选购。
    </div>

    <div style="margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;">
      <span style="font-size:14px;font-weight:500;">参与人：</span>
      <span id="user-list"></span>
      <span style="margin-left:auto;font-size:12px;color:var(--color-text-secondary);" id="auto-status">🔄 自动刷新中（15秒）</span>
    </div>

    <div id="summary-container"></div>

    <div class="action-bar">
      <div class="left">
        <button class="btn btn-outline" id="btn-refresh">🔄 立即刷新</button>
        <span style="font-size:12px;color:var(--color-text-secondary);" id="last-update"></span>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/gitee-api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/summary.js"></script>
</body>
</html>
